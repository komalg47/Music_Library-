<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MusicVerse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-page">

    <!-- Left branding panel -->
    <div class="auth-branding">
        <div class="brand-logo">🎵</div>
        <div class="brand-name">MusicVerse</div>
        <p class="brand-tagline">Your personal music library. Organize, discover, and enjoy your favorite tracks.</p>

        <div class="brand-features">
            <div class="brand-feature-item">
                <span class="feat-icon">🎧</span>
                <span>Unlimited playlists</span>
            </div>
            <div class="brand-feature-item">
                <span class="feat-icon">❤️</span>
                <span>Mark your favorites</span>
            </div>
            <div class="brand-feature-item">
                <span class="feat-icon">🎤</span>
                <span>Browse by artist</span>
            </div>
        </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p class="subtitle">Login to continue your music journey</p>

            <form id="loginForm">

                <div class="form-group">
                    <label for="loginEmail">Email address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input
                            type="email"
                            id="loginEmail"
                            class="form-control"
                            placeholder="name@example.com"
                            autocomplete="email"
                            required>
                    </div>
                    <div class="field-error"></div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="loginPassword"
                            class="form-control has-toggle"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required>
                        <button type="button" class="toggle-password" tabindex="-1">👁</button>
                    </div>
                    <div class="field-error"></div>
                </div>

                <button type="submit" class="btn-auth">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>

            </form>

            <div class="auth-divider">OR</div>

            <a href="admin-login.html" class="btn-admin-link">
                🔐 Admin Login
            </a>

            <div class="auth-alt-link">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>

        </div>
    </div>

</div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
