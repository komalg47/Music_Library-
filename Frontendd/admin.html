<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — MusicVerse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- Admin Navbar -->
<nav class="mv-nav" style="border-bottom-color:rgba(239,68,68,0.2);">
  <div class="mv-nav-brand" style="cursor:default;">
    <i class="bi bi-shield-lock-fill" style="background:linear-gradient(135deg,#F87171,#EF4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;"></i>
    MusicVerse Admin
  </div>
  <div class="mv-nav-links">
    <a href="admin-landing.html" class="mv-nav-link"><i class="bi bi-house"></i> <span>Home</span></a>
    <button class="mv-btn mv-btn-outline mv-btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></button>
  </div>
</nav>

<!-- Layout -->
<div class="admin-stats-bar">
  <div class="admin-stat-item">
    <i class="bi bi-people-fill" style="color:var(--cyan);"></i>
    <div>
      <div class="admin-stat-num" id="statArtistCount">—</div>
      <div class="admin-stat-label">Artists</div>
    </div>
  </div>
  <div class="admin-stat-item">
    <i class="bi bi-music-note-list" style="color:var(--purple);"></i>
    <div>
      <div class="admin-stat-num" id="statSongCount">—</div>
      <div class="admin-stat-label">Songs</div>
    </div>
  </div>
</div>

<div class="admin-layout">

  <!-- LEFT SIDEBAR — Forms -->
  <aside class="admin-sidebar">

    <!-- Add Artist -->
    <div class="admin-form-card">
      <h3 class="admin-form-title"><i class="bi bi-person-plus"></i> Add Artist</h3>
      <div class="mv-form-group">
        <label class="mv-label">Artist Name <span class="req">*</span></label>
        <input type="text" id="artistName" class="mv-input" placeholder="e.g. Arijit Singh">
      </div>
      <button class="mv-btn mv-btn-primary w-full" onclick="addArtist()">
        <i class="bi bi-plus-lg"></i> Add Artist
      </button>
    </div>

    <!-- Add Song -->
    <div class="admin-form-card">
      <h3 class="admin-form-title"><i class="bi bi-music-note-plus"></i> Add Song</h3>

      <div class="mv-form-group">
        <label class="mv-label">Song Name <span class="req">*</span></label>
        <input type="text" id="songName" class="mv-input" placeholder="e.g. Tum Hi Ho">
      </div>

      <div class="mv-form-group">
        <label class="mv-label">Artist <span class="req">*</span></label>
        <div class="autocomplete-wrapper">
          <input type="text" id="artist" class="mv-input" placeholder="e.g. Arijit Singh" autocomplete="off">
          <div class="autocomplete-list" id="artistSuggest"></div>
        </div>
      </div>

      <div class="mv-form-group">
        <label class="mv-label">Album <span class="req">*</span></label>
        <input type="text" id="album" class="mv-input" placeholder="e.g. Aashiqui 2">
      </div>

      <div class="mv-form-group">
        <label class="mv-label">Music Director <span class="req">*</span></label>
        <div class="autocomplete-wrapper">
          <input type="text" id="musicDirector" class="mv-input" placeholder="e.g. Mithoon" autocomplete="off">
          <div class="autocomplete-list" id="directorSuggest"></div>
        </div>
      </div>

      <div class="mv-form-group">
        <label class="mv-label">Release Date <span class="req">*</span></label>
        <input type="date" id="releaseDate" class="mv-input">
      </div>

      <div class="mv-form-group">
        <label class="mv-label">Cover Image <span class="req">*</span></label>
        <div class="cover-file-wrap">
          <input type="file" id="coverImageFile" accept="image/*" onchange="previewCover(this)">
          <label for="coverImageFile" class="cover-file-label">
            <i class="bi bi-upload"></i> Choose from device
          </label>
          <span id="coverFileName" class="cover-file-name">No file chosen</span>
        </div>
        <div id="coverPreviewWrap" style="display:none;margin-top:10px;">
          <img id="coverPreviewImg" style="width:100%;max-height:140px;object-fit:cover;border-radius:10px;">
        </div>
        <!-- Hidden: stores the filename to send to backend -->
        <input type="hidden" id="coverImage">
      </div>

      <button class="mv-btn mv-btn-primary w-full" onclick="addSong()">
        <i class="bi bi-plus-lg"></i> Add Song
      </button>
    </div>

  </aside>

  <!-- RIGHT MAIN — Lists -->
  <main class="admin-main">

    <!-- Artists list -->
    <div class="admin-section">
      <div class="admin-section-header">
        <h2><i class="bi bi-people"></i> Artists <span id="artistBadge" class="mv-badge" style="font-size:0.75rem;">0</span></h2>
      </div>
      <div id="artistList"></div>
    </div>

    <!-- Songs list -->
    <div class="admin-section">
      <div class="admin-section-header">
        <h2><i class="bi bi-music-note-list"></i> Songs <span id="songBadge" class="mv-badge" style="font-size:0.75rem;">0</span></h2>
        <input type="text" id="adminSearchSong" class="mv-input" style="max-width:260px;" placeholder="🔍 Filter songs…">
      </div>
      <div class="mv-table-wrap">
        <table class="mv-table">
          <thead>
            <tr>
              <th>Song</th>
              <th>Artist</th>
              <th>Album</th>
              <th>Director</th>
              <th>Date</th>
              <th style="width:120px;">Actions</th>
            </tr>
          </thead>
          <tbody id="songTableBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- Song Detail / Edit Panel -->
<div class="detail-panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<aside class="detail-panel" id="detailPanel">
  <div class="detail-panel-header">
    <h3 id="panelTitle">Song Details</h3>
    <button class="mv-btn-icon" onclick="closePanel()"><i class="bi bi-x-lg"></i></button>
  </div>
  <div class="detail-panel-body" id="panelBody"></div>
  <div class="detail-panel-footer" id="panelFooter"></div>
</aside>

<!-- Edit Artist Modal -->
<div class="mv-modal-overlay" id="editArtistModal">
  <div class="mv-modal">
    <div class="mv-modal-header">
      <h3><i class="bi bi-pencil"></i> Edit Artist</h3>
      <button class="mv-btn-icon" onclick="closeEditArtistModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="mv-modal-body">
      <input type="hidden" id="editArtistId">
      <label class="mv-label">Artist Name</label>
      <input type="text" id="editArtistName" class="mv-input" placeholder="Artist name"
             onkeydown="if(event.key==='Enter') saveArtistEdit()">
    </div>
    <div class="mv-modal-footer">
      <button class="mv-btn mv-btn-outline" onclick="closeEditArtistModal()">Cancel</button>
      <button class="mv-btn mv-btn-success" onclick="saveArtistEdit()">
        <i class="bi bi-check-lg"></i> Save
      </button>
    </div>
  </div>
</div>

<!-- Confirm Dialog Modal -->
<div class="mv-modal-overlay" id="confirmModal">
  <div class="mv-modal" style="max-width:400px;">
    <div class="mv-modal-header">
      <h3 id="confirmTitle">Confirm</h3>
      <button class="mv-btn-icon" onclick="confirmResolve(false)"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="mv-modal-body">
      <p id="confirmMsg" style="color:var(--text-muted);font-size:0.92rem;line-height:1.6;"></p>
    </div>
    <div class="mv-modal-footer">
      <button class="mv-btn mv-btn-outline" onclick="confirmResolve(false)">Cancel</button>
      <button class="mv-btn mv-btn-danger" id="confirmOkBtn" onclick="confirmResolve(true)">
        <i class="bi bi-trash"></i> Delete
      </button>
    </div>
  </div>
</div>

<script src="js/ui.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
