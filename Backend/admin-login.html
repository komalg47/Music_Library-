<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MusicVerse</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-login.css">
</head>
<body>

<div class="auth-page">

    <!-- Left branding panel (admin-themed) -->
    <div class="auth-branding">
        <div class="brand-logo">🛡️</div>
        <div class="brand-name">Admin Panel</div>
        <p class="brand-tagline">Restricted access. Only authorized administrators may proceed.</p>

        <div class="brand-features">
            <div class="brand-feature-item">
                <span class="feat-icon">🎵</span>
                <span>Manage songs library</span>
            </div>
            <div class="brand-feature-item">
                <span class="feat-icon">🎤</span>
                <span>Manage artists</span>
            </div>
            <div class="brand-feature-item">
                <span class="feat-icon">📊</span>
                <span>View all users</span>
            </div>
        </div>
    </div>

    <!-- Right form panel -->
    <div class="auth-form-panel">
        <div class="auth-card">

            <div class="admin-badge">🔐 Admin Access</div>

            <h2>Admin Login</h2>
            <p class="subtitle">Enter your admin credentials to continue</p>

            <form id="adminLoginForm">

                <div class="form-group">
                    <label for="username">Admin Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">✉️</span>
                        <input
                            type="email"
                            id="username"
                            class="form-control"
                            placeholder="admin@musicverse.com"
                            autocomplete="email"
                            required>
                    </div>
                    <div class="field-error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            id="password"
                            class="form-control has-toggle"
                            placeholder="Enter admin password"
                            autocomplete="current-password"
                            required>
                        <button type="button" class="toggle-password" tabindex="-1">👁</button>
                    </div>
                    <div class="field-error"></div>
                </div>

                <button type="submit" class="btn-auth">
                    <span class="btn-text">Sign In as Admin</span>
                    <div class="spinner"></div>
                </button>

            </form>

            <a href="login.html" class="back-to-user">
                ← Back to user login
            </a>

        </div>
    </div>

</div>

<script src="js/ui.js"></script>
<script src="js/admin-login.js"></script>

</body>
</html>
