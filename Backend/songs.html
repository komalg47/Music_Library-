<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songs — MusicVerse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/songs.css">
</head>
<body>

<nav class="mv-nav">
  <a href="dashboard.html" class="mv-nav-brand"><i class="bi bi-music-note-beamed"></i> MusicVerse</a>
  <div class="mv-nav-links">
    <a href="dashboard.html" class="mv-nav-link"><i class="bi bi-house"></i> <span>Home</span></a>
    <a href="songs.html"    class="mv-nav-link active"><i class="bi bi-music-note-list"></i> <span>Songs</span></a>
    <a href="playlist.html" class="mv-nav-link"><i class="bi bi-collection-play"></i> <span>Playlists</span></a>
    <a href="favorites.html"class="mv-nav-link"><i class="bi bi-heart"></i> <span>Favorites</span></a>
    <a href="artists.html"  class="mv-nav-link"><i class="bi bi-person-lines-fill"></i> <span>Artists</span></a>
    <button class="mv-btn mv-btn-outline mv-btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> <span>Logout</span></button>
  </div>
</nav>

<div class="container" style="max-width:1200px;padding-top:32px;">

  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:4px;">Browse Songs</h2>
      <p style="color:var(--text-muted);font-size:0.88rem;">Search by song, artist, album or music director</p>
    </div>
    <div id="songCountBadge" class="mv-badge"><i class="bi bi-music-note-list"></i> <span id="totalCount">0</span> songs</div>
  </div>

  <!-- Search with autocomplete -->
  <div class="autocomplete-wrapper mb-4">
    <div style="position:relative;">
      <i class="bi bi-search" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;"></i>
      <input type="text" id="searchSong" class="mv-input" style="padding-left:42px;border-radius:12px;font-size:0.95rem;"
             placeholder="Search songs, artists, albums, directors…">
    </div>
    <div class="autocomplete-list" id="searchSuggestions"></div>
  </div>

  <div class="row" id="songsContainer"></div>
</div>

<!-- Playlist Modal -->
<div class="mv-modal-overlay" id="playlistModalOverlay">
  <div class="mv-modal">
    <div class="mv-modal-header">
      <h3><i class="bi bi-collection-play"></i> Add to Playlist</h3>
      <button class="mv-btn-icon" onclick="closePlaylistModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="mv-modal-body">
      <p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:16px;">Choose a playlist or create a new one</p>
      <div id="playlistList" style="display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;margin-bottom:16px;"></div>
      <hr style="border-color:var(--glass-border);margin-bottom:16px;">
      <div style="display:flex;gap:10px;">
        <input type="text" id="newPlaylistName" class="mv-input" placeholder="New playlist name…" style="flex:1;">
        <button class="mv-btn mv-btn-success" onclick="createPlaylistAndAddSong()">
          <i class="bi bi-plus-lg"></i> Create
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/ui.js"></script>
<script src="js/songs.js"></script>
</body>
</html>
